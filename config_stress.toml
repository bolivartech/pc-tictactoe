# Stress test config — CL enabled (M1+M2+M3), random opponent depth
# Use with: cargo run --release -- stress-test -c config_stress.toml

[agent]
gamma = 0.99
surprise_low = 0.02
surprise_high = 0.15
adaptive_surprise = true
surprise_buffer_size = 400
entropy_coeff = 0.0

td_steps = 5

# M1 — Scale range
scale_floor = 0.0
scale_ceil = 2.0

# M2 — Hysteresis
actor_hysteresis = true
actor_fast_window = 20
actor_slow_window = 200
actor_wake_fraction = 0.5
actor_sleep_fraction = 0.3

critic_hysteresis = true
critic_fast_window = 20
critic_slow_window = 200
critic_wake_fraction = 0.5
critic_sleep_fraction = 0.3

actor_wakes_critic = true
actor_wakes_critic_threshold = 1000
critic_wakes_actor = true
critic_wakes_actor_threshold = 1000

# M3 — Consolidation
consolidation_decay = 0.95
critic_consolidation_decay = 0.95
adaptive_consolidation = true
consolidation_ema_beta = 0.99
consolidation_sigmoid_k = 10.0
consolidation_error_threshold = 0.05

# M4 — EWC disabled
ewc_lambda = 0.0

[agent.actor]
input_size = 9
output_size = 9
output_activation = "linear"
alpha = 0.03
tol = 0.01
min_steps = 1
max_steps = 5
lr_weights = 0.005
synchronous = true
temperature = 1.0
local_lambda = 0.9999
residual = true
rezero_init = 0.1

[[agent.actor.hidden_layers]]
size = 27
activation = "softsign"

[[agent.actor.hidden_layers]]
size = 27
activation = "softsign"

[[agent.actor.hidden_layers]]
size = 18
activation = "softsign"

[agent.critic]
input_size = 81
output_activation = "linear"
lr = 0.005

[[agent.critic.hidden_layers]]
size = 36
activation = "softsign"

[training]
episodes = 100000
checkpoint_interval = 5000
log_interval = 1000
seed = 42

[curriculum]
advance_threshold = 0.95
window_size = 1000

[continuous]
max_episodes = 100000
random_side = true  # Stochastic environment for stress test

[stress_test]
champion_path = "champion.json"
opponent_depth_min = 1
opponent_depth_max = 9
max_episodes = 100000
assessment_interval = 1000
assessment_games = 200
log_path = "stress_test.csv"
output_agent_path = "champion_post_stress.json"

[logger]
level = "info"
max_backups = 3
max_size = 10485760
