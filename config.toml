[agent]
gamma = 0.99
surprise_low = 0.02
surprise_high = 0.15
adaptive_surprise = true
surprise_buffer_size = 400
entropy_coeff = 0.0
# Continuous Learning (all disabled by default)
# M1 — Surprise-driven scale range
scale_floor = 0.0
scale_ceil = 2.0
# M2 — Hysteresis (dual-EWMA state machines)
actor_hysteresis = false
critic_hysteresis = false
# M3 — Consolidation decay
consolidation_decay = 1.0
critic_consolidation_decay = 1.0
adaptive_consolidation = false
# M4 — EWC
ewc_lambda = 0.0

[agent.actor]
input_size = 9
output_size = 9
output_activation = "linear"
alpha = 0.03
tol = 0.01
min_steps = 1
max_steps = 5
lr_weights = 0.005
synchronous = true
temperature = 1.0
local_lambda = 0.9999
residual = true
rezero_init = 0.1

[[agent.actor.hidden_layers]]
size = 27
activation = "softsign"

[[agent.actor.hidden_layers]]
size = 27
activation = "softsign"

[[agent.actor.hidden_layers]]
size = 18
activation = "softsign"

[agent.critic]
# 9 + 27 + 27 + 18 = 81
input_size = 81
output_activation = "linear"
lr = 0.005

[[agent.critic.hidden_layers]]
size = 36
activation = "softsign"

[training]
episodes = 200000
checkpoint_interval = 5000
log_interval = 500
seed = 42

[curriculum]
advance_threshold = 0.95
window_size = 1000

[continuous]
max_episodes = 50000
surprise_threshold = 0.1

[logger]
level = "info"
max_backups = 3
max_size = 10485760
