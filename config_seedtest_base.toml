# Seed-test BASELINE — Phase 1 + Phase 2 self-recovery DISABLED.
#
# Control group for the 35-seed self-recovery comparison. Mirrors
# config_cl_experiment.toml (REINFORCE/GAE(1.0) baseline, 3-layer
# [27,27,18] softsign + residual, 200k episodes, alternating sides)
# so results stack directly against the prior CL experiment sweeps.
# CL M1 (scale_floor = 0.1 legacy) kept ON for parity with
# config_cl_experiment.toml; M2-M4 and both self-recovery phases OFF.
#
# Usage:
#   cargo run --release -- seed-test -c config_seedtest_base.toml --n 35 --continuous
#
# Shares skeleton with config_seedtest_p1.toml and
# config_seedtest_p1p2.toml — only the self-recovery knobs differ.

[agent]
gamma = 0.99
surprise_low = 0.02
surprise_high = 0.15
adaptive_surprise = true
surprise_buffer_size = 400
entropy_coeff = 0.0

# ── GAE(λ): eligibility traces ───────────────────────────────────
td_steps = 0
gae_lambda = 1.0               # GAE(1.0) = pure MC (REINFORCE-equivalent)

# ── M1: Surprise-driven scale range — legacy behavior ───────────
scale_floor = 0.1
scale_ceil = 2.0

# ── M2: Hysteresis — DISABLED ───────────────────────────────────
actor_hysteresis = false
critic_hysteresis = false
actor_wakes_critic = false
critic_wakes_actor = false

# ── M3: Consolidation decay — DISABLED ──────────────────────────
consolidation_decay = 1.0
critic_consolidation_decay = 1.0
adaptive_consolidation = false

# ── M4: EWC — DISABLED ──────────────────────────────────────────
ewc_lambda = 0.0

# ── Phase 1 (distillation anchors) — DISABLED ───────────────────
distillation_lambda_polyak = 0.0
polyak_tau = 0.005
distillation_lambda_frozen = 0.0

# ── Phase 2 (replay buffer) — DISABLED ──────────────────────────
replay_training_capacity = 0
replay_recent_capacity = 0
replay_positive_only = true
replay_batch_size = 64

[agent.actor]
input_size = 9
output_size = 9
output_activation = "linear"
alpha = 0.03
tol = 0.01
min_steps = 1
max_steps = 5
lr_weights = 0.005
synchronous = true
temperature = 1.0
local_lambda = 0.9999
residual = true
rezero_init = 0.1

[[agent.actor.hidden_layers]]
size = 27
activation = "softsign"

[[agent.actor.hidden_layers]]
size = 27
activation = "softsign"

[[agent.actor.hidden_layers]]
size = 18
activation = "softsign"

[agent.critic]
# 9 + 27 + 27 + 18 = 81
input_size = 81
output_activation = "linear"
lr = 0.005

[[agent.critic.hidden_layers]]
size = 36
activation = "softsign"

[training]
episodes = 200000
checkpoint_interval = 5000
log_interval = 500
seed = 42

[curriculum]
advance_threshold = 0.95
window_size = 1000

[continuous]
max_episodes = 200000
random_side = false            # Alternating (even=P1, odd=P2) — matches prior CL sweeps

[logger]
level = "info"
max_backups = 3
max_size = 10485760
