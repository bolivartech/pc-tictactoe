# Champion search config — TD(5), CL disabled, alternating sides, 200k per session
# Use with: cargo run --release -- find-champion -c config_champion.toml

[agent]
gamma = 0.99
surprise_low = 0.02
surprise_high = 0.15
adaptive_surprise = true
surprise_buffer_size = 400
entropy_coeff = 0.0

# TD(5) = Monte Carlo for TicTacToe
td_steps = 5

# CL disabled — exploration phase
scale_floor = 0.1
scale_ceil = 2.0
actor_hysteresis = false
critic_hysteresis = false
actor_wakes_critic = false
critic_wakes_actor = false
consolidation_decay = 1.0
critic_consolidation_decay = 1.0
adaptive_consolidation = false
ewc_lambda = 0.0

[agent.actor]
input_size = 9
output_size = 9
output_activation = "linear"
alpha = 0.03
tol = 0.01
min_steps = 1
max_steps = 5
lr_weights = 0.005
synchronous = true
temperature = 1.0
local_lambda = 0.9999
residual = true
rezero_init = 0.1

[[agent.actor.hidden_layers]]
size = 27
activation = "softsign"

[[agent.actor.hidden_layers]]
size = 27
activation = "softsign"

[[agent.actor.hidden_layers]]
size = 18
activation = "softsign"

[agent.critic]
input_size = 81
output_activation = "linear"
lr = 0.005

[[agent.critic.hidden_layers]]
size = 36
activation = "softsign"

[training]
episodes = 200000
checkpoint_interval = 5000
log_interval = 1000
seed = 42

[curriculum]
advance_threshold = 0.95
window_size = 1000

[continuous]
max_episodes = 200000
random_side = false  # Alternating sides for REINFORCE-compatible comparison

[champion]
n_iterations = 50
assessment_depth = 9
assessment_games_running = 50
assessment_games_final = 500
assessment_interval = 1000
output_path = "champion.json"
min_depth_filter = 0

[logger]
level = "info"
max_backups = 3
max_size = 10485760
