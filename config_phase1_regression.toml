# Phase 1 self-recovery regression config (plan: 2026-04-13-self-recovery.md).
# Single-layer best episodic config from CLAUDE.md with seed=42, 50k episodes.
# All new CL features at no-op defaults to isolate "Phase 1 code present,
# features off" regression surface. Baseline: depth 8 on continuos_learning
# HEAD prior to the plan.

[agent]
gamma = 0.99
surprise_low = 0.02
surprise_high = 0.15
adaptive_surprise = false
surprise_buffer_size = 400
entropy_coeff = 0.0
td_steps = 0
# M1 — Surprise-driven scale range (no-op: symmetric around 1.0x)
scale_floor = 0.0
scale_ceil = 2.0
# M2 — Hysteresis disabled
actor_hysteresis = false
critic_hysteresis = false
# M3 — Consolidation decay disabled
consolidation_decay = 1.0
critic_consolidation_decay = 1.0
adaptive_consolidation = false
# M4 — EWC disabled
ewc_lambda = 0.0

[agent.actor]
input_size = 9
output_size = 9
output_activation = "linear"
alpha = 0.03
tol = 0.01
min_steps = 1
max_steps = 5
lr_weights = 0.005
synchronous = true
temperature = 1.0
local_lambda = 0.99
residual = false
rezero_init = 0.1

[[agent.actor.hidden_layers]]
size = 27
activation = "tanh"

[agent.critic]
# 9 board + 27 latent = 36
input_size = 36
output_activation = "linear"
lr = 0.005

[[agent.critic.hidden_layers]]
size = 36
activation = "tanh"

[training]
episodes = 50000
checkpoint_interval = 5000
log_interval = 500
seed = 42

[curriculum]
advance_threshold = 0.95
window_size = 1000

[continuous]
max_episodes = 50000

[logger]
level = "info"
max_backups = 3
max_size = 10485760
