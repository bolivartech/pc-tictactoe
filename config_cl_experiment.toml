# Continuous Learning experiment config — 3-layer network, all CL features enabled
# Use with: cargo run --release -- seed-test -c config_cl_experiment.toml -n 35 --continuous

[agent]
gamma = 0.99
surprise_low = 0.02
surprise_high = 0.15
adaptive_surprise = true
surprise_buffer_size = 400
entropy_coeff = 0.0

# ── TD(n): n-step returns ────────────────────────────────────────
td_steps = 4                   # 4-step returns for TicTacToe (5-9 step episodes)

# ── M1: Surprise-driven scale range ──────────────────────────────
scale_floor = 0.0              # True weight freeze when surprise is low
scale_ceil = 2.0               # 2x learning rate when surprise is high

# ── M2: Hysteresis — dual-EWMA FROZEN/PLASTIC state machines ────
actor_hysteresis = true
actor_fast_window = 20
actor_slow_window = 500         # Wider window to smooth Player One/Two oscillation
actor_wake_fraction = 0.5
actor_sleep_fraction = 0.10     # Freeze when fast < slow × 0.90

critic_hysteresis = true
critic_fast_window = 20
critic_slow_window = 100
critic_wake_fraction = 0.5
critic_sleep_fraction = 0.3

actor_wakes_critic = true
actor_wakes_critic_threshold = 1000
critic_wakes_actor = true
critic_wakes_actor_threshold = 1000

# ── M3: Consolidation decay — per-layer learning rate modulation ─
consolidation_decay = 0.95     # Shallow layers consolidate faster
critic_consolidation_decay = 0.95
adaptive_consolidation = true  # Sigmoid-driven per-layer decay
consolidation_ema_beta = 0.99
consolidation_sigmoid_k = 10.0
consolidation_error_threshold = 0.05

# ── M4: EWC — disabled for curriculum learning ──────────────────
ewc_lambda = 0.0

[agent.actor]
input_size = 9
output_size = 9
output_activation = "linear"
alpha = 0.03
tol = 0.01
min_steps = 1
max_steps = 5
lr_weights = 0.005
synchronous = true
temperature = 1.0
local_lambda = 0.9999
residual = true
rezero_init = 0.1

[[agent.actor.hidden_layers]]
size = 27
activation = "softsign"

[[agent.actor.hidden_layers]]
size = 27
activation = "softsign"

[[agent.actor.hidden_layers]]
size = 18
activation = "softsign"

[agent.critic]
# 9 + 27 + 27 + 18 = 81
input_size = 81
output_activation = "linear"
lr = 0.005

[[agent.critic.hidden_layers]]
size = 36
activation = "softsign"

[training]
episodes = 500000
checkpoint_interval = 5000
log_interval = 500
seed = 42

[curriculum]
advance_threshold = 0.95
window_size = 1000

[continuous]
max_episodes = 500000

[logger]
level = "info"
max_backups = 3
max_size = 10485760
